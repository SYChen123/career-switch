name: Scrape Links

on:
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Run scraper (manual)
        run: |
          python3 scripts/scrape.py --industry all
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: data/links
# Note: this workflow does NOT commit results back to repo. To enable commit, add a PAT secret and modify steps accordingly.
